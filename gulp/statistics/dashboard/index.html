<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="UTF-8" />
	<title>Project Statistics</title>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
	<script src="/statistics/dashboard/dashboard.js"></script>

	<style>
		body {
			font-family: sans-serif;
			padding: 40px;
		}

		.stats {
			display: flex;
			gap: min(calc(20px + 20px), calc(20px + 20 * ((100vw - 375px) / 1545)));
			flex-wrap: wrap;
			margin-bottom: 40px;
			font-size: 20px;
		}

		.items {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(550px, 1fr));
			gap: 20px;
		}
	</style>
</head>

<body>

	<h1>📊 Статистика проекта</h1>

	<div class="stats">
		<div>⏱ Общее время: <strong id="totalTime"></strong></div>
		<div>📏 Средняя сессия: <strong id="avgSession"></strong></div>
		<div>⚡ Средняя сборка: <strong id="buildAvg"></strong></div>
	</div>

	<div class="items">
		<div class="item">
			<h2>🔥 ТОП файлов</h2>
			<canvas id="filesChart"></canvas>
		</div>
		<div class="item">
			<h2>📅 Работа по дням</h2>
			<canvas id="sessionsChart"></canvas>
		</div>
		<div class="item">
			<h2>🚀 Средняя скорость сборки</h2>
			<canvas id="buildChart"></canvas>
		</div>
	</div>



</body>

</html>
